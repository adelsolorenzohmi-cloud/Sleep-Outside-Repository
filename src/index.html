<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sleep Outside | Home</title>
  <link rel="stylesheet" href="./css/style.css" />
  <script src="./js/main.js" type="module"></script>
</head>

<body>
  <header class="divider" id="main-header"></header>

  <main>
    <section class="hero">
      <img src="./images/banner.jpg" alt="Stargazing from a tent" />
      <div class="hero-banner-box">
        <img src="./images/noun_Tent_2517.svg" alt="Tent Logo" />
        <div class="logo-text">Sleep<span class="highlight">Outside</span></div>
      </div>
    </section>

    <section class="mission">
      <div class="category-grid">
        <a href="product_listing/index.html?category=tents">
          <img src="/images/noun_Tent_2517.svg" alt="Tents">
          <p>Tents</p>
        </a>
        <a href="product_listing/index.html?category=backpacks">
          <img src="/images/noun_Backpack_2517.svg" alt="Backpacks">
          <p>Backpacks</p>
        </a>
        <a href="product_listing/index.html?category=sleeping-bags">
          <img src="/images/noun_Sleeping Bag_2517.svg" alt="Sleeping Bags">
          <p>Sleeping Bags</p>
        </a>
        <a href="product_listing/index.html?category=hammocks">
          <img src="/images/noun_Hammock_2517.svg" alt="Hammocks">
          <p>Hammocks</p>
        </a>
      </div>
    </section>

    <section class="products">
      <h2>Top Products</h2>
      <ul class="product-list"></ul>
    </section>
  </main>

  <footer id="main-footer"></footer>
</body>

</html>
